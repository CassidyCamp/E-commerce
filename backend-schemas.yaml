components:
  schemas:
    CartItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: integer
        quantity:
          type: integer
          readOnly: true
      required:
      - id
      - product
      - quantity
    CategorySerailzer:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 64
        image:
          type: string
          format: uri
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - image
      - name
      - slug
    FavoritSerailzer:
      type: object
      properties:
        product:
          type: integer
      required:
      - product
    Order:
      type: object
      properties:
        full_name:
          type: string
          maxLength: 32
        phone:
          type: string
          maxLength: 15
        address:
          type: string
          maxLength: 64
        house:
          type: string
          maxLength: 32
        apartment:
          type: string
          maxLength: 32
        comment:
          type: string
          maxLength: 500
        total_price:
          type: number
          format: double
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        items:
          type: array
          items:
            type: integer
          writeOnly: true
      required:
      - address
      - apartment
      - comment
      - full_name
      - house
      - items
      - phone
      - status
      - total_price
    PatchedCartItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: integer
        quantity:
          type: integer
          readOnly: true
    PatchedCategorySerailzer:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 64
        image:
          type: string
          format: uri
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
    PatchedFavoritSerailzer:
      type: object
      properties:
        product:
          type: integer
    PatchedOrder:
      type: object
      properties:
        full_name:
          type: string
          maxLength: 32
        phone:
          type: string
          maxLength: 15
        address:
          type: string
          maxLength: 64
        house:
          type: string
          maxLength: 32
        apartment:
          type: string
          maxLength: 32
        comment:
          type: string
          maxLength: 500
        total_price:
          type: number
          format: double
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        items:
          type: array
          items:
            type: integer
          writeOnly: true
    PatchedProductSerailzer:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        image:
          type: string
          format: uri
        title:
          type: string
          maxLength: 128
        description:
          type: string
          maxLength: 2000
        regular_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        card_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
        discount_percent:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,2})?$
          nullable: true
        brand:
          type: string
          maxLength: 128
        country:
          type: string
          maxLength: 128
        weight:
          type: string
          maxLength: 68
        stock:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        is_available:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    ProductSerailzer:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        image:
