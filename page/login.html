<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kirish - Severyanochka</title>
    <script>
      if (localStorage.getItem("access")) {
        window.location.href = "/index.html";
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/login.css" />
    <script src="https://accounts.google.com/gsi/client?hl=uz" async defer></script>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <span class="logo-text">🛒 Severyanochka</span>
      </div>

      <h1>Kirish</h1>
      <p class="subtitle">Xush kelibsiz! Iltimos, hisobingizga kiring</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <input type="email" id="email" name="email" required />
            <div class="error-message" id="emailError"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Parol</label>
          <div class="input-wrapper">
            <input type="password" id="password" name="password" required />
            <div class="error-message" id="passwordError"></div>
          </div>
        </div>

        <div class="forgot-password">
          <a href="#parolni-unutdim">Parolni unutdingizmi?</a>
        </div>

        <button type="submit" class="btn-primary">Kirish</button>
      </form>

      <div class="divider">
        <span>yoki</span>
      </div>
      <div id="googleButtonContainer" style="display: flex; justify-content: center; width: 100%; border-radius: 12px; overflow: hidden; height: 44px; margin-bottom: 15px;"></div>

      <div class="signup-link">
        Hisobingiz yo'qmi? <a href="register.html">Ro'yxatdan o'ting</a>
      </div>
    </div>

    <script>
  const form = document.getElementById("loginForm");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const emailError = document.getElementById("emailError");
  const passwordError = document.getElementById("passwordError");

  // Clear errors on input
  emailInput.addEventListener("input", () => {
    emailInput.classList.remove("error");
    emailError.classList.remove("show");
  });

  passwordInput.addEventListener("input", () => {
    passwordInput.classList.remove("error");
    passwordError.classList.remove("show");
  });

  // Form submission
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    emailInput.classList.remove("error");
    passwordInput.classList.remove("error");
    emailError.classList.remove("show");
    passwordError.classList.remove("show");

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    let hasError = false;

    if (!email) {
      emailInput.classList.add("error");
      emailError.textContent = "Emailingizni kiriting";
      emailError.classList.add("show");
      hasError = true;
    }

    if (!password) {
      passwordInput.classList.add("error");
      passwordError.textContent = "Parolni kiriting";
      passwordError.classList.add("show");
      hasError = true;
    }

    if (hasError) return;

    try {
      const response = await fetch("http://localhost:8000/api/auth/login/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });

      const data = await response.json();

      if (!response.ok) {
        if (data.detail) {
          emailInput.classList.add("error");
          emailError.textContent = data.detail;
          emailError.classList.add("show");
        }
        if (data.email) {
          emailInput.classList.add("error");
          emailError.textContent = data.email[0];
          emailError.classList.add("show");
        }
        if (data.password) {
          passwordInput.classList.add("error");
          passwordError.textContent = data.password[0];
          passwordError.classList.add("show");
        }
        if (data.non_field_errors) {
          passwordInput.classList.add("error");
          passwordError.textContent = data.non_field_errors[0];
          passwordError.classList.add("show");
        }
      } else if (data.success) {
        localStorage.setItem("register_email", email);
        window.location.href = "verify-otp.html";
      }
    } catch (error) {
      console.error("Login error:", error);
      passwordInput.classList.add("error");
      passwordError.textContent = "Xatolik yuz berdi. Qaytadan urinib ko'ring.";
      passwordError.classList.add("show");
    }
  });

  // Google Sign-In SDK configuration for standard renderButton flow
  window.onload = function () {
    if (window.google) {
      google.accounts.id.initialize({
        client_id: "2358723045-7eaqviti9gdji864u11dlvmcotcp1mvm.apps.googleusercontent.com",
        callback: handleGoogleAuth
      });

      const googleBtnContainer = document.getElementById("googleButtonContainer");
      const primaryBtnWidth = document.querySelector('.btn-primary').offsetWidth || 370;

      google.accounts.id.renderButton(
        googleBtnContainer,
        {
          theme: "outline",
          size: "large",
          type: "standard",
          shape: "rectangular",
          text: "signin_with",
          logo_alignment: "center",
          width: primaryBtnWidth.toString()
        }
      );
    }
  };

  async function handleGoogleAuth(response) {
    if (!response.credential) {
      console.error("Google auth prompt xatosi yoki block");
      return;
    }

    try {
      const authResponse = await fetch("http://localhost:8000/api/auth/google/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token: response.credential }),
      });

      const data = await authResponse.json();

      if (!authResponse.ok) {
        console.error("Google token xato:", data);
        alert("Google orqali kirishda serverda xatolik yuz berdi");
        return;
      }

      if (data.access) {
        localStorage.setItem("access", data.access);
        localStorage.setItem("refresh", data.refresh);
        window.location.href = "/index.html";
      }
    } catch (error) {
      console.error("Google authentication request error:", error);
    }
  }
</script>
  </body>
</html>
